<div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-icon">
                <i class="fas fa-shopping-bag"></i>
            </span>
            <span class="sidebar-brand-text">JasonShop <span class="admin-label">Admin</span></span>
        </div>

        <nav class="sidebar-nav">
            <a class="sidebar-link"
                routerLink="/admin/dashboard"
                routerLinkActive="active">
                <i class="fas fa-chart-bar"></i><span>Dashboard</span>
            </a>
            <a class="sidebar-link"
                routerLink="/admin/orders"
                routerLinkActive="active">
                <i class="fas fa-list-alt"></i><span>Đơn hàng</span>
            </a>
            <a class="sidebar-link"
                routerLink="/admin/products"
                routerLinkActive="active">
                <i class="fas fa-box-open"></i><span>Sản phẩm</span>
            </a>
            <a class="sidebar-link"
                routerLink="/admin/categories"
                routerLinkActive="active">
                <i class="fas fa-tags"></i><span>Danh mục</span>
            </a>
            <a class="sidebar-link"
                routerLink="/admin/users"
                routerLinkActive="active">
                <i class="fas fa-users"></i><span>Người dùng</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="sidebar-logout" (click)="logout()">
                <i class="fas fa-sign-out-alt"></i><span>Đăng xuất</span>
            </button>
        </div>
    </aside>

    <!-- Main content area -->
    <div class="admin-main">
        <header class="admin-topbar">
            <h2 class="topbar-title">Quản trị hệ thống</h2>
            <div class="topbar-user">
                <i class="fas fa-user-shield me-1"></i>
                <span>{{ userResponse?.fullname }}</span>
            </div>
        </header>
        <div class="admin-content">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
