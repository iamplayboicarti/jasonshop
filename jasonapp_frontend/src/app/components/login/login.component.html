<app-header></app-header>
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5 col-xl-4">

                <!-- Logo -->
                <div class="auth-logo">
                    <span class="auth-logo-icon">
                        <i class="fas fa-shopping-bag"></i>
                    </span>
                    <span class="auth-logo-text">Jason<span>Shop</span></span>
                </div>

                <div class="auth-card">
                    <h2 class="auth-title">Đăng nhập</h2>
                    <p class="auth-subtitle">Chào mừng bạn quay lại!</p>

                    <form #loginForm="ngForm">
                        <div class="form-group mb-4">
                            <label class="form-label" for="phoneNumber">Số điện thoại</label>
                            <div class="input-icon-wrap">
                                <i class="fas fa-phone input-icon"></i>
                                <input type="text" class="form-control auth-input"
                                    [(ngModel)]="phoneNumber"
                                    (input)="onPhoneNumberChange()"
                                    name="phone"
                                    (focus)="loginForm.form.markAsTouched()"
                                    placeholder="Nhập số điện thoại"
                                    id="phoneNumber">
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label" for="password">Mật khẩu</label>
                            <div class="password-field input-icon-wrap">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="{{ showPassword ? 'text' : 'password' }}"
                                    [(ngModel)]="password"
                                    name="password"
                                    placeholder="Ít nhất 3 ký tự"
                                    class="form-control auth-input"
                                    id="password">
                                <i class="password-toggle fas"
                                    [ngClass]="showPassword ? 'fa-eye' : 'fa-eye-slash'"
                                    (click)="togglePassword()"></i>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="form-check">
                                    <input type="checkbox"
                                        class="form-check-input"
                                        id="remember"
                                        [(ngModel)]="rememberMe"
                                        name="rememberMe">
                                    <label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label>
                                </div>
                                <a href="#" class="forgot-link">Quên mật khẩu?</a>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label">Quyền đăng nhập</label>
                            <select class="form-select auth-input" [(ngModel)]="selectedRole" name="selectedRole">
                                <option selected disabled>Chọn quyền</option>
                                @for(role of roles; track role.name) {
                                    <option [ngValue]="role">{{ role.name }}</option>
                                }
                            </select>
                        </div>
                    </form>

                    <button type="button" (click)="login()" class="btn-auth-primary">
                        <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                    </button>

                    <div class="divider-text">
                        <span>hoặc đăng nhập với</span>
                    </div>

                    <div class="social-login-buttons">
                        <button type="button" (click)="loginWithGoogle()" class="btn-social btn-google">
                            <i class="fab fa-google me-2"></i>Google
                        </button>
                        <button type="button" (click)="loginWithFacebook()" class="btn-social btn-facebook">
                            <i class="fab fa-facebook-f me-2"></i>Facebook
                        </button>
                    </div>

                    <p class="auth-footer-text">
                        Bạn chưa có tài khoản?
                        <a class="auth-link" (click)="createAccount()">Đăng ký ngay</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>
<app-footer></app-footer>
